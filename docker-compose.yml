version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eauction_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eauction
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eauction"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: eauction_api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/eauction
      - ENVIRONMENT=development
      - JWT_SECRET_KEY=dev-secret-key-do-not-use-in-prod
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: eauction_web
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/v1/ws

volumes:
  postgres_data:
