name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend — Lint, Type Check, Unit Tests
  # ─────────────────────────────────────────────────────────────────────────────
  api-lint:
    name: "API — Lint & Format"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ruff (linter)
        run: ruff check .

      - name: Run ruff (formatter check)
        run: ruff format --check .

  api-test:
    name: "API — Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eauction
          POSTGRES_PASSWORD: eauction_pass
          POSTGRES_DB: eauction_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://eauction:eauction_pass@localhost:5432/eauction_db
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-that-is-at-least-32-characters-long
      JWT_REFRESH_SECRET_KEY: test-refresh-secret-at-least-32-characters-long-here

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test database
        run: |
          PGPASSWORD=eauction_pass psql -h localhost -U eauction -d eauction_db \
            -c "CREATE DATABASE eauction_test OWNER eauction;" || true

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run unit tests
        run: pytest tests/unit/ -v --no-cov

      - name: Run integration tests
        run: pytest tests/integration/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          flags: backend
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker — Build Verification
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: "Docker — Build Verification"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: false
          tags: eauction-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
